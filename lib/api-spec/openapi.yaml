openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SwipeJob API — Tinder-style job matching
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: profile
  - name: jobs
  - name: swipes
  - name: matches
  - name: applications
  - name: stats
  - name: employer
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /me:
    get:
      operationId: getMe
      tags: [profile]
      summary: Get current candidate profile (creates anonymous one if missing)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Candidate" }
    put:
      operationId: updateMe
      tags: [profile]
      summary: Update candidate profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CandidateUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Candidate" }

  /jobs/feed:
    get:
      operationId: getJobFeed
      tags: [jobs]
      summary: List jobs the candidate hasn't swiped on yet
      parameters:
        - name: location
          in: query
          required: false
          schema: { type: string }
        - name: remote
          in: query
          required: false
          schema: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Job" }

  /jobs/{jobId}:
    get:
      operationId: getJob
      tags: [jobs]
      parameters:
        - name: jobId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Job" }

  /jobs/{jobId}/swipe:
    post:
      operationId: swipeJob
      tags: [swipes]
      summary: Record a swipe (right=interested, left=pass)
      parameters:
        - name: jobId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SwipeInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SwipeResult" }

  /matches:
    get:
      operationId: listMatches
      tags: [matches]
      summary: List of mutual interest matches (employer accepted candidate)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Match" }

  /matches/{matchId}/send-cv:
    post:
      operationId: confirmSendCv
      tags: [matches]
      summary: Confirm sending CV after a match
      parameters:
        - name: matchId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConfirmSendCvInput" }
      responses:
        "200":
          description: Application submitted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Application" }

  /matches/{matchId}/messages:
    get:
      operationId: listMatchMessages
      tags: [matches]
      summary: List messages for a match (candidate side)
      parameters:
        - name: matchId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Message" }
    post:
      operationId: sendMatchMessage
      tags: [matches]
      summary: Send a message in a match (candidate side)
      parameters:
        - name: matchId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MessageInput" }
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }

  /employer/{companyId}/matches/{matchId}/messages:
    get:
      operationId: listEmployerMatchMessages
      tags: [employer]
      summary: List messages for a match (employer side)
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string }
        - name: matchId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Message" }
    post:
      operationId: sendEmployerMatchMessage
      tags: [employer]
      summary: Send a message in a match (employer side)
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string }
        - name: matchId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MessageInput" }
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }

  /matches/{matchId}/dismiss:
    post:
      operationId: dismissMatch
      tags: [matches]
      summary: Dismiss a match without sending CV
      parameters:
        - name: matchId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Dismissed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Match" }

  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List of CV applications sent to companies
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Application" }

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [stats]
      summary: Candidate dashboard summary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatsSummary" }

  /stats/activity:
    get:
      operationId: getRecentActivity
      tags: [stats]
      summary: Recent activity feed
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ActivityItem" }

  /employer/companies:
    get:
      operationId: listEmployerCompanies
      tags: [employer]
      summary: List companies that an employer can act as (demo)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Company" }

  /employer/{companyId}/feed:
    get:
      operationId: getEmployerFeed
      tags: [employer]
      summary: Pending candidates who right-swiped on this company's jobs
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/EmployerFeedItem" }

  /employer/{companyId}/swipes/{swipeId}:
    post:
      operationId: employerDecide
      tags: [employer]
      summary: Accept (creates a match) or pass on a candidate
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string }
        - name: swipeId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmployerDecisionInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmployerDecisionResult" }

  /employer/{companyId}/jobs:
    get:
      operationId: listEmployerJobs
      tags: [employer]
      summary: List jobs posted by this company
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Job" }
    post:
      operationId: createEmployerJob
      tags: [employer]
      summary: Post a new job opening for this company
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JobInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Job" }

  /employer/{companyId}/jobs/{jobId}:
    delete:
      operationId: deleteEmployerJob
      tags: [employer]
      summary: Remove a job opening
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string }
        - name: jobId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }

  /employer/{companyId}/matches:
    get:
      operationId: listEmployerMatches
      tags: [employer]
      summary: Matches and applications belonging to this company
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/EmployerMatch" }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    Candidate:
      type: object
      required: [id, anonymousHandle, skills, createdAt]
      properties:
        id: { type: string }
        anonymousHandle: { type: string, description: "Anonymized handle shown to employers before match" }
        fullName: { type: string, nullable: true }
        email: { type: string, nullable: true }
        headline: { type: string, nullable: true, description: "Short professional summary" }
        location: { type: string, nullable: true }
        yearsExperience: { type: integer, nullable: true }
        skills:
          type: array
          items: { type: string }
        cvText: { type: string, nullable: true, description: "Plain text CV / resume content" }
        desiredRole: { type: string, nullable: true }
        openToRemote: { type: boolean, nullable: true }
        createdAt: { type: string, format: date-time }

    CandidateUpdate:
      type: object
      properties:
        fullName: { type: string, nullable: true }
        email: { type: string, nullable: true }
        headline: { type: string, nullable: true }
        location: { type: string, nullable: true }
        yearsExperience: { type: integer, nullable: true }
        skills:
          type: array
          items: { type: string }
        cvText: { type: string, nullable: true }
        desiredRole: { type: string, nullable: true }
        openToRemote: { type: boolean, nullable: true }

    Company:
      type: object
      required: [id, name]
      properties:
        id: { type: string }
        name: { type: string }
        logoColor: { type: string, nullable: true, description: "Hex color used for logo placeholder" }
        industry: { type: string, nullable: true }
        size: { type: string, nullable: true }
        about: { type: string, nullable: true }

    Job:
      type: object
      required: [id, title, company, location, employmentType, skills, postedAt]
      properties:
        id: { type: string }
        title: { type: string }
        company: { $ref: "#/components/schemas/Company" }
        location: { type: string }
        remote: { type: boolean }
        employmentType: { type: string, description: "e.g. Full-time, Contract" }
        salaryMin: { type: integer, nullable: true }
        salaryMax: { type: integer, nullable: true }
        salaryCurrency: { type: string, nullable: true }
        description: { type: string }
        responsibilities:
          type: array
          items: { type: string }
        skills:
          type: array
          items: { type: string }
        perks:
          type: array
          items: { type: string }
        screeningQuestions:
          type: array
          items: { type: string }
        postedAt: { type: string, format: date-time }
        matchScore:
          type: integer
          nullable: true
          description: "0-100 estimated fit score for the current candidate"

    SwipeInput:
      type: object
      required: [direction]
      properties:
        direction:
          type: string
          enum: [left, right]

    SwipeResult:
      type: object
      required: [swipeId, direction, matched]
      properties:
        swipeId: { type: string }
        direction:
          type: string
          enum: [left, right]
        matched:
          type: boolean
          description: "true if employer also expressed interest, creating a match"
        match:
          $ref: "#/components/schemas/Match"
          nullable: true

    Match:
      type: object
      required: [id, job, status, createdAt, unreadCount]
      properties:
        id: { type: string }
        job: { $ref: "#/components/schemas/Job" }
        status:
          type: string
          enum: [pending_confirmation, cv_sent, dismissed]
        createdAt: { type: string, format: date-time }
        unreadCount: { type: integer, minimum: 0 }

    Application:
      type: object
      required: [id, job, status, sentAt, screeningAnswers]
      properties:
        id: { type: string }
        job: { $ref: "#/components/schemas/Job" }
        status:
          type: string
          enum: [submitted, viewed, interview, rejected]
        sentAt: { type: string, format: date-time }
        screeningAnswers:
          type: array
          items: { $ref: "#/components/schemas/ScreeningAnswer" }

    Message:
      type: object
      required: [id, matchId, sender, body, createdAt]
      properties:
        id: { type: string }
        matchId: { type: string }
        sender:
          type: string
          enum: [candidate, employer]
        body: { type: string }
        createdAt: { type: string, format: date-time }

    MessageInput:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1, maxLength: 2000 }

    ScreeningAnswer:
      type: object
      required: [question, answer]
      properties:
        question: { type: string }
        answer: { type: string }

    ConfirmSendCvInput:
      type: object
      properties:
        screeningAnswers:
          type: array
          items: { $ref: "#/components/schemas/ScreeningAnswer" }

    StatsSummary:
      type: object
      required: [totalSwipes, rightSwipes, matches, applicationsSent, profileCompleteness]
      properties:
        totalSwipes: { type: integer }
        rightSwipes: { type: integer }
        matches: { type: integer }
        applicationsSent: { type: integer }
        profileCompleteness:
          type: integer
          description: "0-100 percent of profile fields filled in"
        topSkillsInDemand:
          type: array
          items:
            type: object
            required: [skill, count]
            properties:
              skill: { type: string }
              count: { type: integer }

    JobInput:
      type: object
      required: [title, location, employmentType, description, skills]
      properties:
        title: { type: string, minLength: 2 }
        location: { type: string, minLength: 1 }
        remote: { type: boolean }
        employmentType: { type: string }
        salaryMin: { type: integer, nullable: true }
        salaryMax: { type: integer, nullable: true }
        salaryCurrency: { type: string, nullable: true }
        description: { type: string, minLength: 10 }
        responsibilities:
          type: array
          items: { type: string }
        skills:
          type: array
          items: { type: string }
        perks:
          type: array
          items: { type: string }
        screeningQuestions:
          type: array
          items: { type: string }

    EmployerFeedItem:
      type: object
      required: [swipeId, candidate, job, swipedAt, matchScore]
      properties:
        swipeId: { type: string }
        candidate:
          type: object
          required: [id, anonymousHandle, skills]
          properties:
            id: { type: string }
            anonymousHandle: { type: string }
            headline: { type: string, nullable: true }
            location: { type: string, nullable: true }
            yearsExperience: { type: integer, nullable: true }
            skills:
              type: array
              items: { type: string }
            desiredRole: { type: string, nullable: true }
            openToRemote: { type: boolean, nullable: true }
        job: { $ref: "#/components/schemas/Job" }
        matchScore: { type: integer }
        swipedAt: { type: string, format: date-time }

    EmployerDecisionInput:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [accept, pass]

    EmployerDecisionResult:
      type: object
      required: [matched]
      properties:
        matched: { type: boolean }
        matchId: { type: string, nullable: true }

    EmployerMatch:
      type: object
      required: [id, anonymousHandle, job, status, createdAt, cvShared, unreadCount]
      properties:
        id: { type: string }
        anonymousHandle: { type: string }
        candidateName: { type: string, nullable: true, description: "Revealed only after candidate sends CV" }
        candidateEmail: { type: string, nullable: true }
        cvText: { type: string, nullable: true }
        candidateSkills:
          type: array
          items: { type: string }
        screeningAnswers:
          type: array
          items: { $ref: "#/components/schemas/ScreeningAnswer" }
        job: { $ref: "#/components/schemas/Job" }
        status:
          type: string
          enum: [pending_confirmation, cv_sent, dismissed]
        cvShared: { type: boolean }
        createdAt: { type: string, format: date-time }
        unreadCount: { type: integer, minimum: 0 }

    ActivityItem:
      type: object
      required: [id, kind, message, at]
      properties:
        id: { type: string }
        kind:
          type: string
          enum: [swipe_right, match, cv_sent, status_change]
        message: { type: string }
        jobId: { type: string, nullable: true }
        at: { type: string, format: date-time }
